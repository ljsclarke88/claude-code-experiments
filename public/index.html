<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 40px 100px;
    }

    header {
      margin-bottom: 80px;
    }

    header h1 {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 40px;
      background: #0a0a0a;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s;
    }

    .card:hover { background: #111; }

    .card__number {
      font-size: 11px;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.2);
    }

    .card h2 {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    .card p {
      font-size: 14px;
      font-style: italic;
      line-height: 1.8;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      flex: 1;
    }

    .card__link {
      font-size: 12px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    .card:hover .card__link { color: rgba(255,255,255,0.7); }

    /* placeholder card style */
    .card--empty {
      border: 1px dashed rgba(255,255,255,0.06);
      background: transparent;
      cursor: default;
    }

    .card--empty:hover { background: transparent; }

    .card--empty h2,
    .card--empty p { color: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Lab</h1>
    </header>

    <div class="grid">

      <a class="card" href="/haiku">
        <span class="card__number">01</span>
        <h2>Haiku</h2>
        <p>Click anywhere on Earth. A haiku returns — shaped by the spirit of that place, drawn from Japanese poetic tradition.</p>
        <span class="card__link">Explore →</span>
      </a>

      <div class="card card--empty">
        <span class="card__number">02</span>
        <h2>—</h2>
        <p>Coming soon.</p>
      </div>

      <div class="card card--empty">
        <span class="card__number">03</span>
        <h2>—</h2>
        <p>Coming soon.</p>
      </div>

    </div>
  </main>
</body>
</html>
