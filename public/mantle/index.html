<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantle</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="header">
    <a href="/" id="back">← Lab</a>
    <h1>Mantle</h1>
    <p>The cuttlefish has no voice. It has only colour and pattern — the oldest language there is. Give it your face and watch it answer.</p>
  </div>

  <div id="scene-wrap">
    <canvas id="three"></canvas>
    <video id="cam" autoplay muted playsinline></video>
    <div id="emotion-tag"></div>
  </div>

  <div id="footer">
    <div id="status"><span class="hint">&nbsp;</span></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';
    import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';

    // ── emotion palettes ──────────────────────────────────────────────────────
    const EMOTIONS = {
      happy:     { colorA:[1.0,0.72,0.08], colorB:[1.0,0.42,0.04], colorC:[0.98,0.95,0.25], speed:1.8,  scale:3.2, pulse:0.85, depth:-0.40 },
      sad:       { colorA:[0.08,0.18,0.58],colorB:[0.18,0.32,0.68],colorC:[0.04,0.08,0.38], speed:0.38, scale:5.5, pulse:0.18, depth: 0.30 },
      angry:     { colorA:[0.92,0.08,0.04],colorB:[0.72,0.28,0.0], colorC:[1.0,0.0,0.08],   speed:2.9,  scale:2.2, pulse:1.0,  depth:-0.20 },
      fearful:   { colorA:[0.28,0.08,0.38],colorB:[0.12,0.04,0.28],colorC:[0.48,0.18,0.52], speed:2.4,  scale:6.5, pulse:0.9,  depth: 0.55 },
      surprised: { colorA:[0.15,0.88,0.98],colorB:[0.78,0.94,1.0], colorC:[0.08,0.58,0.92], speed:2.6,  scale:1.8, pulse:0.95, depth: 0.25 },
      disgusted: { colorA:[0.32,0.42,0.08],colorB:[0.18,0.28,0.04],colorC:[0.48,0.38,0.12], speed:0.55, scale:4.2, pulse:0.32, depth: 0.30 },
      neutral:   { colorA:[0.22,0.48,0.42],colorB:[0.14,0.36,0.38],colorC:[0.32,0.52,0.48], speed:0.75, scale:4.8, pulse:0.38, depth: 0.00 },
      calm:      { colorA:[0.08,0.48,0.52],colorB:[0.12,0.58,0.48],colorC:[0.04,0.32,0.44], speed:0.32, scale:6.2, pulse:0.22, depth: 0.00 },
      excited:   { colorA:[0.92,0.08,0.58],colorB:[0.68,0.04,0.88],colorC:[1.0,0.48,0.08],  speed:3.2,  scale:1.8, pulse:1.0,  depth:-0.50 },
      anxious:   { colorA:[0.42,0.38,0.18],colorB:[0.28,0.28,0.12],colorC:[0.58,0.48,0.22], speed:2.1,  scale:5.8, pulse:0.78, depth: 0.40 },
    };

    // ── renderer ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('three');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000510, 0.040);

    const camera = new THREE.PerspectiveCamera(44, 1, 0.1, 120);
    camera.position.set(0.5, 1.2, 9);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.minDistance = 3;
    controls.maxDistance = 20;
    controls.target.set(0, 0, 0);
    controls.autoRotate = false;

    // ── post-processing ───────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(1,1), 0.50, 0.45, 0.54);
    composer.addPass(bloom);
    composer.addPass(new OutputPass());

    // ── skin shader ───────────────────────────────────────────────────────────
    const skinVert = `
      uniform float uTime;
      varying vec3 vNormal, vObjNormal, vPosition;
      varying vec2 vUv;
      varying vec3 vWorldPos;
      void main(){
        vNormal    = normalize(normalMatrix * normal);
        vObjNormal = normalize(normal);
        vPosition  = position;
        vUv        = uv;

        // Fin and tentacle motion — fixed slow speeds, fully independent of emotion state
        float finFactor = smoothstep(0.18, 0.28, abs(position.z));
        float tipFactor = smoothstep(0.30, 0.44, abs(position.x));
        vec3 disp = vec3(0.0);
        // Fin: undulation wave along body, ~4 s per cycle — feels like natural swimming
        disp.y += sin(position.x * 12.0 + uTime * 1.60 + position.z * 4.0) * 0.013 * finFactor;
        disp.y += sin(position.x *  7.0 + uTime * 1.10 + position.z * 2.5 + 2.1) * 0.007 * finFactor;
        // Tentacle tips: layered sway, ~6–8 s per cycle
        disp.y += sin(position.x *  5.0 + uTime * 1.00) * 0.016 * tipFactor;
        disp.y += sin(position.x *  3.2 + uTime * 0.68 + 3.1) * 0.009 * tipFactor;
        disp.z += sin(position.x *  4.2 + uTime * 0.75 + 1.8) * 0.012 * tipFactor;

        vec4 wp    = modelMatrix * vec4(position + disp, 1.0);
        vWorldPos  = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `;
    const skinFrag = `
      precision highp float;
      uniform float uTime;
      uniform vec3  uColorA,uColorB,uColorC;
      uniform float uSpeed,uScale,uPulse;
      uniform float uWave,uFlash;
      uniform vec3  uCamPos;
      varying vec3  vNormal,vObjNormal,vPosition;
      varying vec2  vUv;
      varying vec3  vWorldPos;

      vec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}
      float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
      float voronoi(vec2 x){
        vec2 n=floor(x),f=fract(x);float d=8.0;
        for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){
          vec2 g=vec2(float(i),float(j)),o=hash2(n+g);
          o=0.5+0.5*sin(uTime*uSpeed*0.38+6.283*o);
          d=min(d,length(g+o-f));}return d;}
      float cells(vec2 uv,float s){return smoothstep(0.55,0.06,voronoi(uv*s));}
      float vnoise(vec2 p){
        vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);
        float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
        return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
      float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<4;i++){v+=a*vnoise(p);p*=2.1;a*=0.5;}return v;}

      void main(){
        float t=uTime;
        vec3 norm=normalize(vNormal),viewDir=normalize(uCamPos-vWorldPos);
        float fr=pow(1.0-max(dot(norm,viewDir),0.0),3.0);
        float dorsal =max(0.0, vObjNormal.y);
        float ventral=max(0.0,-vObjNormal.y);

        vec3 baseColor=mix(vec3(0.52,0.44,0.34),vec3(0.28,0.14,0.42),ventral*0.72);
        float stripe=smoothstep(0.35,0.65,sin(vUv.x*18.0+fbm(vUv*2.2)*0.9)*0.5+0.5);
        baseColor=mix(baseColor,vec3(0.03,0.02,0.04),stripe*dorsal*0.92);

        // continuous shimmer — always travels head-to-tail, faster with emotion intensity
        float ssp=max(uSpeed,0.80);
        float sh1=smoothstep(0.2,0.8,sin(vUv.x*6.0 +t*ssp*2.2     )*0.5+0.5);
        float sh2=smoothstep(0.2,0.8,sin(vUv.x*3.8 +t*ssp*1.5+1.9 )*0.5+0.5);
        float sh3=smoothstep(0.2,0.8,sin(vUv.x*9.5 +t*ssp*3.1+3.7 )*0.5+0.5);
        float shimStr=(0.28+uPulse*0.52)*(1.0-ventral*0.35);
        vec3 shimCol=mix(mix(uColorA,uColorB,sh1),uColorC,sh2*sh3);
        shimCol*=1.5+sh1*0.5;
        baseColor=mix(baseColor,shimCol,shimStr*(sh1*0.55+sh2*0.30+sh3*0.20));

        vec2 skinUv=vec2(vUv.x*2.8,vUv.y+t*uSpeed*0.04);
        float c1=cells(skinUv,uScale),c2=cells(skinUv*0.44+vec2(0.31,0.68),uScale*2.1);
        float r1=smoothstep(0.4,0.6,sin(vUv.x*11.0+t*uSpeed*2.4)*0.5+0.5);
        float r2=smoothstep(0.4,0.6,sin(vUv.x*7.0 +t*uSpeed*1.8+0.9)*0.5+0.5);
        float wave=sin(vPosition.x*4.8+t*uSpeed*1.2)*0.5+0.5;
        wave+=sin(vPosition.z*3.5+t*uSpeed*0.7+1.1)*0.22;

        float pulse=uPulse*(sin(t*uSpeed*2.8)*0.5+0.5);
        float pat=clamp(c1*0.58+c2*0.26+wave*0.26+r1*r2*0.35*uPulse+pulse*0.16,0.0,1.0);
        vec3 emCol=mix(uColorA,uColorB,c1);
        emCol=mix(emCol,uColorC,r1*r2*pulse);
        baseColor=mix(baseColor,emCol,pat*0.70);

        // ── fingerprint flow-lines — slow-drifting contour ridges for surface depth ──
        float fNoise=fbm(vUv*3.4+vec2(t*0.009,t*0.004));
        float fBand =sin(vUv.x*21.0+fNoise*6.2+vUv.y*3.6)*0.5+0.5;
        baseColor  *=mix(1.0,0.14,smoothstep(0.40,0.54,fBand)*dorsal*0.82);

        // ── self-luminous chromatophore dots — cool blue + warm copper ────────────
        float dC=cells(vUv*2.55+vec2(0.19,0.47),40.0);
        float dW=cells(vUv*1.88+vec2(0.63,0.29),26.0);
        vec3 coolGlow=mix(vec3(0.20,0.68,1.00),uColorC,0.30)*3.2;
        vec3 warmGlow=vec3(1.00,0.58,0.14)*2.6;
        baseColor=mix(baseColor,coolGlow,dC*0.60*(0.40+uPulse*0.60));
        baseColor=mix(baseColor,warmGlow,dW*0.34*(0.36+uPulse*0.44));

        vec3 irid=mix(mix(uColorC,vec3(0.22,0.88,0.96),0.45),mix(uColorA,vec3(0.88,0.22,0.94),0.35),
                      sin(fr*3.14159+t*0.48)*0.5+0.5);
        baseColor=mix(baseColor,irid,fr*0.44);
        baseColor=mix(baseColor,vec3(0.60,0.48,0.80)*1.5,ventral*fr*0.32);
        baseColor+=pow(1.0-max(dot(norm,viewDir),0.0),2.6)*uColorC*0.30;
        baseColor*=(0.72+0.28*smoothstep(0.0,0.38,min(vUv.x,1.0-vUv.x)));

        // Chromatophore wave — sweeps head-to-tail on emotion change
        float waveCenter = mix(-0.50, 0.50, clamp(uWave, 0.0, 1.0));
        float waveGlow   = smoothstep(0.20, 0.0, abs(vPosition.x - waveCenter))
                         * step(0.0, uWave) * (1.0 - step(1.0, uWave));
        baseColor = mix(baseColor, uColorA * 2.4 + uColorC * 0.6, waveGlow * 0.65);

        // Startle flash — brief bright pulse on high-intensity emotion
        baseColor = mix(baseColor, uColorB * 2.2, uFlash * 0.45);

        gl_FragColor=vec4(baseColor,1.0);
      }
    `;

    let cur={...EMOTIONS.neutral,colorA:[...EMOTIONS.neutral.colorA],colorB:[...EMOTIONS.neutral.colorB],colorC:[...EMOTIONS.neutral.colorC]};
    let tgt={...cur};
    const uniforms={
      uTime:{value:0},
      uColorA:{value:new THREE.Vector3(...EMOTIONS.neutral.colorA)},
      uColorB:{value:new THREE.Vector3(...EMOTIONS.neutral.colorB)},
      uColorC:{value:new THREE.Vector3(...EMOTIONS.neutral.colorC)},
      uSpeed:{value:EMOTIONS.neutral.speed},
      uScale:{value:EMOTIONS.neutral.scale},
      uPulse:{value:EMOTIONS.neutral.pulse},
      uWave: {value:-1.0},
      uFlash:{value:0.0},
      uCamPos:{value:new THREE.Vector3()},
    };
    const skinMat=new THREE.ShaderMaterial({vertexShader:skinVert,fragmentShader:skinFrag,uniforms,side:THREE.DoubleSide});

    const eyeMat=new THREE.MeshStandardMaterial({color:0x030408,roughness:0.05,metalness:0.30,envMapIntensity:0.8});

    // ── cuttlefish group ──────────────────────────────────────────────────────
    const cuttle    = new THREE.Group();
    const modelWrap = new THREE.Group(); // child: breathe scale applied here
    cuttle.add(modelWrap);
    scene.add(cuttle);

    // ── load glTF model ───────────────────────────────────────────────────────
    const eyeMeshes = [];

    new GLTFLoader().load('./cuttlefish/scene.gltf', gltf => {
      const model = gltf.scene;

      model.traverse(child => {
        if (!child.isMesh) return;
        child.frustumCulled = false;
        // The 2 small meshes (118 verts each) are the eyes — dark glossy material.
        // The large mesh (1086 verts) is the body — shimmer shader.
        if (child.geometry.attributes.position.count < 200) {
          child.material = eyeMat;
          eyeMeshes.push(child);
        } else {
          child.material = skinMat;
        }
      });

      // Compute bounds BEFORE applying rotation — model is not in the scene yet
      // so its world matrix is purely its own local matrix (identity at this point).
      // This avoids a coordinate-space mismatch when subtracting the centre.
      const box     = new THREE.Box3().setFromObject(model);
      const size    = box.getSize(new THREE.Vector3());
      const longest = Math.max(size.x, size.y, size.z);
      model.scale.setScalar(5.0 / longest);

      const centre = box.getCenter(new THREE.Vector3());
      model.position.set(-centre.x, -centre.y, -centre.z);

      // Flip 180° so head faces camera (head is at -X in the original model space;
      // after the flip it sits at +X, which the cuttle rotation maps to world +Z).
      model.rotation.y = Math.PI;

      modelWrap.add(model);
    }, undefined, err => console.error('GLTFLoader:', err));

    // ── ocean dome background ─────────────────────────────────────────────────
    const domeMat=new THREE.ShaderMaterial({
      side:THREE.BackSide,
      uniforms:{uEmCol:{value:new THREE.Vector3(0.04,0.12,0.36)},uTime:{value:0}},
      vertexShader:`varying vec3 vPos;void main(){vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
      fragmentShader:`
        uniform vec3 uEmCol;uniform float uTime;varying vec3 vPos;
        void main(){
          float up=dot(normalize(vPos),vec3(0,1,0))*0.5+0.5;
          vec3 col=mix(vec3(0.0,0.010,0.040),vec3(0.0,0.032,0.095)+uEmCol*0.09,pow(up,0.6));
          col+=vec3(0.0,0.005,0.016)*sin(vPos.y*0.35+uTime*0.07)*0.4;
          gl_FragColor=vec4(col,1.0);}
      `,
    });
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(60,16,8),domeMat));

    // ── 3 faint god rays ──────────────────────────────────────────────────────
    const godRayMats=[];
    function buildRay(xPos,zPos,w,tilt,ph){
      const v=new Float32Array([0,0,0,-w*0.5,-10,0,w*0.5,-10,0]);
      const u=new Float32Array([0.5,1,0,0,1,0]);
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(v,3));
      geo.setAttribute('uv',      new THREE.BufferAttribute(u,2));
      const mat=new THREE.ShaderMaterial({
        transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide,
        uniforms:{uCol:{value:new THREE.Vector3(0.1,0.35,0.65)},uTime:{value:0},uPh:{value:ph}},
        vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
        fragmentShader:`uniform vec3 uCol;uniform float uTime,uPh;varying vec2 vUv;
          void main(){float a=vUv.y*vUv.y*0.07*(sin(uTime*0.3+uPh)*0.25+0.75);
          a*=1.0-abs(vUv.x-0.5)*1.9;gl_FragColor=vec4(uCol,max(0.0,a));}`,
      });
      godRayMats.push(mat);
      const m=new THREE.Mesh(geo,mat);m.position.set(xPos,7,zPos);m.rotation.z=tilt;m.rotation.x=-0.12;scene.add(m);
    }
    buildRay(-3.5,-3,1.4,-0.20,0.0);buildRay(0.5,-2,1.8,-0.02,1.8);buildRay(4.0,-4,1.1,0.22,3.6);

    // ── lighting ──────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x08101e,3.2));
    const key=new THREE.DirectionalLight(0x4488ee,4.0);key.position.set(4,6,5);scene.add(key);
    const fill=new THREE.DirectionalLight(0x220033,2.0);fill.position.set(-5,-2,3);scene.add(fill);
    const rim=new THREE.DirectionalLight(0x00eebb,2.6);rim.position.set(0,4,-8);scene.add(rim);
    const causticLight=new THREE.PointLight(0x0055bb,2.4,14);causticLight.position.set(0,5,2);scene.add(causticLight);

    // ── particles ─────────────────────────────────────────────────────────────
    const pp=new Float32Array(500*3);
    for(let i=0;i<500;i++){pp[i*3]=(Math.random()-0.5)*26;pp[i*3+1]=(Math.random()-0.5)*14;pp[i*3+2]=(Math.random()-0.5)*26;}
    const pGeo=new THREE.BufferGeometry();pGeo.setAttribute('position',new THREE.BufferAttribute(pp,3));
    scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x152234,size:0.04,transparent:true,opacity:0.40})));

    // ── state lerp ────────────────────────────────────────────────────────────
    const lerp =(a,b,t)=>a+(b-a)*t;
    const lerpA=(a,b,t)=>a.map((v,i)=>lerp(v,b[i],t));
    const L=0.022;

    let lastEmotion='neutral';
    function transitionTo(key){
      const e=EMOTIONS[key]||EMOTIONS.neutral;
      if(key===lastEmotion)return; // only react to changes
      lastEmotion=key;
      tgt={...e,colorA:[...e.colorA],colorB:[...e.colorB],colorC:[...e.colorC]};
      // Chromatophore wave on every emotion change
      uniforms.uWave.value=0.0;
      // Startle flash for high-intensity emotions
      if(e.pulse>0.80) uniforms.uFlash.value=1.0;
      const tag=document.getElementById('emotion-tag');
      tag.textContent=key;tag.classList.remove('fade-in');void tag.offsetWidth;tag.classList.add('fade-in');
    }

    // ── face tracking ─────────────────────────────────────────────────────────
    let trackTargetX=0,trackTargetY=0,trackX=0,trackY=0;

    // ── spring dynamics — drifts against random current, springs back to face ───
    let posX=0,posY=0,posZ=0,velX=0,velY=0,velZ=0,nextImpulseT=1.5;
    cuttle.rotation.y=-Math.PI/2;

    // ── resize ────────────────────────────────────────────────────────────────
    function resize(){
      const wrap=document.getElementById('scene-wrap');
      const w=wrap.clientWidth,h=wrap.clientHeight;
      renderer.setSize(w,h);composer.setSize(w,h);bloom.resolution.set(w,h);
      camera.aspect=w/h;camera.updateProjectionMatrix();
    }
    resize();window.addEventListener('resize',resize);

    // ── render loop ───────────────────────────────────────────────────────────
    const clock=new THREE.Clock();
    let prevT=0;

    function animate(){
      requestAnimationFrame(animate);
      const t=clock.getElapsedTime();
      const delta=t-prevT; prevT=t;

      // state
      cur.colorA=lerpA(cur.colorA,tgt.colorA,L*5);
      cur.colorB=lerpA(cur.colorB,tgt.colorB,L*5);
      cur.colorC=lerpA(cur.colorC,tgt.colorC,L*5);
      cur.speed =lerp(cur.speed,tgt.speed,L*2.5);
      cur.scale =lerp(cur.scale,tgt.scale,L*2.5);
      cur.pulse =lerp(cur.pulse,tgt.pulse,L*2.5);
      cur.depth =lerp(cur.depth,tgt.depth,L*2.5);
      uniforms.uTime.value=t;
      uniforms.uColorA.value.set(...cur.colorA);
      uniforms.uColorB.value.set(...cur.colorB);
      uniforms.uColorC.value.set(...cur.colorC);
      // rhythmic base pulse — always runs so patterns never go static between detections
      const rhythmPulse=(Math.sin(t*1.4)*0.5+0.5)*0.18+(Math.sin(t*0.7+0.3)*0.5+0.5)*0.08;
      uniforms.uSpeed.value=Math.max(cur.speed,0.42);
      uniforms.uScale.value=cur.scale;
      uniforms.uPulse.value=Math.min(1.0,cur.pulse+rhythmPulse);
      uniforms.uCamPos.value.copy(camera.position);

      // Chromatophore wave — advances until complete, then stays at -1 (inactive)
      if(uniforms.uWave.value>=0&&uniforms.uWave.value<1.0){
        uniforms.uWave.value=Math.min(1.0,uniforms.uWave.value+delta*0.75);
      }
      // Startle flash — decays quickly
      uniforms.uFlash.value=Math.max(0,uniforms.uFlash.value-delta*3.5);

      // micro-tremors — high-freq water texture
      const microX=Math.sin(t*6.7)*0.0015+Math.sin(t*11.3)*0.00065;
      const microY=Math.sin(t*7.9+0.7)*0.00115+Math.sin(t*13.1)*0.0005;
      const microZ=Math.sin(t*5.8+1.4)*0.00085;
      const microRoll=Math.sin(t*9.1+2.0)*0.002+Math.sin(t*14.3+0.5)*0.00085;

      // face tracking
      trackX+=(trackTargetX-trackX)*0.0075;
      trackY+=(trackTargetY-trackY)*0.0075;

      // drift impulse — small random current, occasional jet burst (15% chance)
      if(t>nextImpulseT){
        const a=Math.random()*Math.PI*2;
        const isJet=Math.random()<0.15;
        const s=isJet?0.042+Math.random()*0.048:0.0065+Math.random()*0.015;
        velX+=Math.cos(a)*s; velY+=(Math.random()-0.5)*s*0.7; velZ+=(Math.random()-0.5)*s*(isJet?0.5:0.22);
        nextImpulseT=t+(isJet?4+Math.random()*6:2.0+Math.random()*3.5);
      }
      // spring — face tracking in XY, emotion depth target in Z
      velX+=(trackX*2.0-posX)*0.0005; velY+=(trackY*(-1.2)-posY)*0.0005; velZ+=(cur.depth-posZ)*0.00085;
      velX*=0.97; velY*=0.97; velZ*=0.97;
      posX+=velX; posY+=velY; posZ+=velZ;

      // body leans subtly into direction of travel
      const leanRoll=Math.sin(t*0.13)*0.00165+microRoll-velX*0.03;
      const leanPit =Math.sin(t*0.17+1.1)*0.00165-velY*0.02;

      // idle yaw — slow irregular look-around, ±24° over ~25–45 s cycles
      const idleYaw=Math.sin(t*0.25)*0.18+Math.sin(t*0.37+1.4)*0.09;
      cuttle.position.set(posX+microX - 1.8, posY+microY, posZ+microZ);
      cuttle.rotation.y=-Math.PI/2+idleYaw;
      cuttle.rotation.x=leanPit;
      cuttle.rotation.z=leanRoll;

      const velmag=Math.sqrt(velX*velX+velY*velY+velZ*velZ);

      // body breathe — layered for organic rise and fall
      const bf=0.55+cur.speed*0.10;
      const breathe=1.0+Math.sin(t*bf)*0.004+Math.sin(t*bf*2.3)*0.00115+Math.sin(t*0.28)*0.00165;
      modelWrap.scale.set(1,breathe,breathe);

      // caustic
      causticLight.position.x=Math.sin(t*0.50)*3.2;
      causticLight.position.z=Math.cos(t*0.38)*3.2+2;
      causticLight.intensity=2.0+Math.sin(t*2.0)*0.6;

      domeMat.uniforms.uTime.value=t;
      domeMat.uniforms.uEmCol.value.set(cur.colorA[0]*0.10,cur.colorA[1]*0.15+0.06,cur.colorA[2]*0.18+0.26);
      godRayMats.forEach(m=>{
        m.uniforms.uTime.value=t;
        m.uniforms.uCol.value.set(cur.colorC[0]*0.28+0.03,cur.colorC[1]*0.22+0.20,cur.colorC[2]*0.32+0.32);
      });

      // subtle eye movement — tiny organic drift so they don't look frozen
      eyeMeshes.forEach((eye, i) => {
        eye.rotation.x = Math.sin(t * 0.9 + i * 0.8) * 0.04;
        eye.rotation.z = Math.sin(t * 0.6 + i * 1.3) * 0.03;
      });

      controls.update();
      composer.render();
    }
    animate();

    // ── camera + emotion (client-side via face-api.js) ────────────────────────
    const video=document.getElementById('cam');
    const MODEL_URL='https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights/';
    let tinyOpts=null,detecting=false;

    function mapToEmotion(e){
      if(e.happy>0.65&&e.surprised>0.15)return'excited';
      if(e.neutral>0.80)return'calm';
      if(e.fearful>0.20&&e.disgusted>0.12)return'anxious';
      return Object.entries(e).reduce((a,b)=>a[1]>b[1]?a:b)[0];
    }

    async function runDetection(){
      if(!video.videoWidth||detecting)return;
      detecting=true;
      try{
        const r=await faceapi.detectSingleFace(video,tinyOpts).withFaceExpressions();
        if(r){
          const b=r.detection.box;
          trackTargetX=(1-(b.x+b.width/2)/video.videoWidth)*2-1;
          trackTargetY=((b.y+b.height/2)/video.videoHeight*2-1)*0.7;
          transitionTo(mapToEmotion(r.expressions));
        }else{
          trackTargetX*=0.96;
          trackTargetY*=0.96;
        }
      }catch{/*keep current*/}
      detecting=false;
    }

    function startCamera(){
      navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240},audio:false})
        .then(async stream=>{
          video.srcObject=stream;
          document.getElementById('status').innerHTML='<span class="hint">loading face reader…</span>';
          await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
          ]);
          tinyOpts=new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.40});
          document.getElementById('status').innerHTML='<span class="hint">reading your expression</span>';
          setInterval(runDetection,250);
          runDetection();
        })
        .catch(()=>{
          document.getElementById('status').innerHTML='<span class="error">camera access denied — the cuttlefish waits</span>';
          transitionTo('calm');
        });
    }
    startCamera();
  </script>

</body>
