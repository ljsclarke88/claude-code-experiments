<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambulant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<a href="/" id="back">← Lab</a>
<video id="cam" autoplay muted playsinline></video>

<!-- intro -->
<div class="state active" id="state-intro">
  <h1>Ambulant</h1>
  <p class="desc">Give the camera your full body and move freely for ten seconds. The system will read your gait and reveal the landscape your body already knows.</p>
  <button id="begin-btn">begin</button>
</div>

<!-- preparing -->
<div class="state" id="state-preparing">
  <p>preparing…</p>
</div>

<!-- countdown -->
<div class="state" id="state-countdown">
  <span id="countdown-number">3</span>
</div>

<!-- recording -->
<div class="state" id="state-recording">
  <div id="progress-track"><div id="progress-fill"></div></div>
  <p>move freely — your body is being read</p>
  <p id="timer-text">0s</p>
</div>

<!-- processing -->
<div class="state" id="state-processing">
  <p>reading your movement…</p>
</div>

<!-- result -->
<div class="state" id="state-result">
  <img id="result-image" src="" alt="">
  <div id="result-overlay">
    <div id="landscape-label"></div>
    <p id="prose-text"></p>
    <button id="again-btn">begin again</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
  }
}
</script>

<script type="module">
  import { PoseLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

  // ── state helper ──────────────────────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  const wait = ms => new Promise(r => setTimeout(r, ms));

  // ── dom refs ──────────────────────────────────────────────────────────────
  const video        = document.getElementById('cam');
  const progressFill = document.getElementById('progress-fill');
  const timerText    = document.getElementById('timer-text');
  const countEl      = document.getElementById('countdown-number');

  // ── mediapipe init ────────────────────────────────────────────────────────
  let poseLandmarker = null;

  async function initPose() {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      numPoses: 1,
      minPoseDetectionConfidence: 0.5,
      minPosePresenceConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
  }

  // ── camera ────────────────────────────────────────────────────────────────
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 640, height: 480 },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.addEventListener('playing', r, { once: true }));
  }

  // ── countdown ─────────────────────────────────────────────────────────────
  async function countdown() {
    show('state-countdown');
    for (let n = 3; n >= 1; n--) {
      countEl.textContent = n;
      countEl.style.animation = 'none';
      void countEl.offsetWidth;
      countEl.style.animation = 'count-in 1s cubic-bezier(0.16,1,0.3,1) both';
      await wait(1000);
    }
  }

  // ── recording ─────────────────────────────────────────────────────────────
  const DURATION  = 10000; // ms
  const SAMPLE_MS = 200;   // 5 fps → 50 frames
  const offCanvas = document.createElement('canvas');
  offCanvas.width = 640; offCanvas.height = 480;
  const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

  async function record() {
    show('state-recording');
    progressFill.style.width = '0%';
    const frames = [];
    const start  = performance.now();

    await new Promise(resolve => {
      function sample() {
        const now     = performance.now();
        const elapsed = now - start;
        const pct     = Math.min(100, (elapsed / DURATION) * 100);
        progressFill.style.width = pct + '%';
        timerText.textContent    = Math.ceil(elapsed / 1000) + 's';

        if (elapsed >= DURATION) { resolve(); return; }

        if (video.videoWidth) {
          offCtx.drawImage(video, 0, 0, 640, 480);
          try {
            const result = poseLandmarker.detectForVideo(offCanvas, now);
            if (result.landmarks?.length) {
              frames.push({ lm: result.landmarks[0], t: elapsed });
            }
          } catch { /* skip bad frame */ }
        }
        setTimeout(sample, SAMPLE_MS);
      }
      sample();
    });

    return frames;
  }

  // ── metric extraction ─────────────────────────────────────────────────────
  const mean   = a => a.reduce((s, v) => s + v, 0) / a.length;
  const stdDev = a => { const m = mean(a); return Math.sqrt(mean(a.map(x => (x - m) ** 2))); };
  const norm   = (v, lo, hi) => Math.max(0, Math.min(1, (v - lo) / (hi - lo)));

  function countPeaks(arr) {
    let n = 0;
    for (let i = 1; i < arr.length - 1; i++)
      if (arr[i] > arr[i - 1] && arr[i] > arr[i + 1]) n++;
    return n;
  }

  function correlation(a, b) {
    const ma = mean(a), mb = mean(b);
    const da = a.map(x => x - ma), db = b.map(x => x - mb);
    const num = da.reduce((s, _, i) => s + da[i] * db[i], 0);
    const den = Math.sqrt(da.reduce((s, x) => s + x * x, 0) * db.reduce((s, x) => s + x * x, 0));
    return den === 0 ? 0 : num / den;
  }

  function extractMetrics(frames) {
    if (frames.length < 8) return null;

    // normalisation baseline: mean shoulder-to-hip distance
    const bodyScale = mean(frames.map(f => {
      const sy = (f.lm[11].y + f.lm[12].y) / 2;
      const hy = (f.lm[23].y + f.lm[24].y) / 2;
      return Math.abs(hy - sy) || 0.01;
    }));

    // 1. cadence — peaks in hip midpoint Y / duration
    const hipY   = frames.map(f => (f.lm[23].y + f.lm[24].y) / 2);
    const durSec = frames[frames.length - 1].t / 1000;
    const cadence = norm(countPeaks(hipY) / Math.max(durSec, 1), 0.3, 2.5);

    // 2. vertical oscillation — nose Y std-dev, normalised to body height
    const noseY  = frames.map(f => f.lm[0].y);
    const vertOsc = norm(stdDev(noseY) / bodyScale, 0.01, 0.20);

    // 3. symmetry — |correlation| of left/right hip Y (opposite-phase walk = 1)
    const lHipY   = frames.map(f => f.lm[23].y);
    const rHipY   = frames.map(f => f.lm[24].y);
    const symmetry = Math.abs(correlation(lHipY, rHipY));

    // 4. arm swing — mean wrist X std-dev normalised to shoulder width
    const shoulderW = mean(frames.map(f => Math.abs(f.lm[11].x - f.lm[12].x))) || 0.01;
    const lWristX   = frames.map(f => f.lm[15].x);
    const rWristX   = frames.map(f => f.lm[16].x);
    const armSwing  = norm((stdDev(lWristX) + stdDev(rWristX)) / 2 / shoulderW, 0.05, 0.55);

    // 5. postural lean — mean |shoulder-to-hip vector angle from vertical|
    const lean = norm(mean(frames.map(f => {
      const sx = (f.lm[11].x + f.lm[12].x) / 2, sy = (f.lm[11].y + f.lm[12].y) / 2;
      const hx = (f.lm[23].x + f.lm[24].x) / 2, hy = (f.lm[23].y + f.lm[24].y) / 2;
      return Math.abs(Math.atan2(hx - sx, Math.abs(hy - sy)));
    })), 0, 0.35);

    // 6. energy — overall movement magnitude across key landmarks
    const allX = frames.flatMap(f => [f.lm[0].x, f.lm[11].x, f.lm[12].x, f.lm[15].x, f.lm[16].x]);
    const allY = frames.flatMap(f => [f.lm[0].y, f.lm[23].y, f.lm[24].y, f.lm[27].y, f.lm[28].y]);
    const energy = norm((stdDev(allX) + stdDev(allY)) / 2, 0.005, 0.07);

    return { cadence, vertOsc, symmetry, armSwing, lean, energy };
  }

  // ── scene generation ───────────────────────────────────────────────────────
  async function generateScene(metrics) {
    const res = await fetch('/api/ambulant/scene', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ metrics })
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  // ── main flow ──────────────────────────────────────────────────────────────
  document.getElementById('begin-btn').addEventListener('click', async () => {
    show('state-preparing');
    try {
      await Promise.all([initPose(), startCamera()]);
      video.classList.add('visible');
      await countdown();
      const frames  = await record();
      video.classList.remove('visible');
      show('state-processing');

      const metrics = extractMetrics(frames);
      if (!metrics) throw new Error('not enough pose data');

      const result = await generateScene(metrics);

      document.getElementById('result-image').src      = `data:${result.mimeType || 'image/png'};base64,${result.image}`;
      document.getElementById('landscape-label').textContent = result.landscape;
      document.getElementById('prose-text').textContent     = result.prose;
      show('state-result');

    } catch (err) {
      console.error(err);
      document.querySelector('#state-processing p').textContent = 'something went wrong — try again';
      await wait(3000);
      show('state-intro');
    }
  });

  document.getElementById('again-btn').addEventListener('click', () => {
    progressFill.style.width = '0%';
    document.querySelector('#state-processing p').textContent = 'reading your movement…';
    show('state-intro');
  });
</script>

</body>
</html>
