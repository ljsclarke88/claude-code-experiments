<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haiku</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://www.webglearth.com/v2/api.js"></script>
  <script>
    var earth;
    var marker = null;
    var satelliteLayer, hybridLayer, labelsVisible = false;

    function initialize() {
      earth = new WE.map('earth_div', { background: '#000000' });
      earth.setView([20, 0], 1.5);

      satelliteLayer = WE.tileLayer('https://api.maptiler.com/tiles/satellite-v2/{z}/{x}/{y}.jpg?key=RBZilnlcNkvvNnkaQ8ay', {
        attribution: '', tileSize: 256, opacity: 1
      }).addTo(earth);

      hybridLayer = WE.tileLayer('https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.png?key=RBZilnlcNkvvNnkaQ8ay', {
        attribution: '', tileSize: 256, opacity: 0
      }).addTo(earth);

      earth.on("click", function(event) {
        placeMarker(event.latlng);
        convertCoordinatesToWords(event.latlng.lat, event.latlng.lng);
      });

      requestAnimationFrame(function monitorZoom() {
        var zoom = earth.getZoom();
        if (zoom >= 2.5 && !labelsVisible) {
          satelliteLayer.setOpacity(0);
          hybridLayer.setOpacity(1);
          labelsVisible = true;
        } else if (zoom < 2.5 && labelsVisible) {
          satelliteLayer.setOpacity(1);
          hybridLayer.setOpacity(0);
          labelsVisible = false;
        }
        requestAnimationFrame(monitorZoom);
      });

      drawStars();
    }

    function drawStars() {
      var canvas = document.getElementById('stars');
      var wrap = document.getElementById('globe-wrap');
      var ctx = canvas.getContext('2d');
      canvas.width = wrap.offsetWidth;
      canvas.height = wrap.offsetHeight;
      for (var i = 0; i < 300; i++) {
        var x = Math.random() * canvas.width;
        var y = Math.random() * canvas.height;
        var r = Math.random() < 0.85 ? Math.random() * 0.5 + 0.1 : Math.random() * 1.2 + 0.5;
        var a = Math.random() * 0.6 + 0.15;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
        ctx.fill();
      }
    }
  </script>
</head>
<body onload="initialize()">

  <div id="header">
    <a href="/" id="back">← Lab</a>
    <h1>Haiku</h1>
    <p>The practice of haiku is a way of dissolving feelings of separation from the world by experiencing the unity of our own nature and the nature of everything around us. Find a place that means something to you and say the haiku in a single breath.</p>
  </div>

  <div id="globe-wrap">
    <canvas id="stars"></canvas>
    <div id="earth_div"></div>
    <div id="atmosphere"></div>
  </div>

  <div id="footer">
    <div id="chat-log"><div class="hint">zoom and click anywhere on the map</div></div>
  </div>

  <script>
    function placeMarker(location) {
      if (marker) {
        marker.setLatLng([location.lat, location.lng]);
      } else {
        marker = WE.marker([location.lat, location.lng]).addTo(earth);
      }
      earth.panTo([location.lat, location.lng]);
    }

    function showLoading() {
      document.getElementById("chat-log").innerHTML = '<div class="loading">composing</div>';
    }

    function showError(msg) {
      document.getElementById("chat-log").innerHTML = '<div class="error">' + msg + '</div>';
    }

    async function convertCoordinatesToWords(latitude, longitude) {
      showLoading();
      const url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + latitude + '&lon=' + longitude;
      try {
        const response = await fetch(url, {
          headers: { 'Accept-Language': 'en', 'User-Agent': 'HaikuApp/1.0' }
        });
        const data = await response.json();
        const addr = data.address || {};
        const candidates = [
          addr.city || addr.town || addr.village || addr.hamlet || addr.suburb,
          addr.county || addr.state_district || addr.state,
          addr.country
        ].filter(Boolean);
        if (candidates.length === 0) throw new Error("no place found");
        sendMessage(candidates.slice(0, 3));
      } catch (err) {
        console.error(err);
        showError("could not find this place");
      }
    }

    async function sendMessage(words) {
      const chatLog = document.getElementById("chat-log");
      try {
        const res = await fetch("/api/haiku", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: words.join(" ") }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        if (!data.completion || !data.completion.content) throw new Error("empty response");
        const lines = data.completion.content
          .split("\n")
          .map(l => l.trim())
          .filter(l => l.length > 0);
        if (lines.length < 3) throw new Error("unexpected haiku format");
        chatLog.innerHTML =
          '<div class="words-label">' + words.join(" · ") + '</div>' +
          '<div class="message">' +
            '<div class="message__text">' + lines[0] + '</div>' +
            '<div class="message__text">' + lines[1] + '</div>' +
            '<div class="message__text">' + lines[2] + '</div>' +
          '</div>';
      } catch (err) {
        console.error(err);
        showError("the haiku could not be written — " + err.message);
      }
    }
  </script>
</body>
</html>
